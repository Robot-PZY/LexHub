<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg{fill:#fff}
      .line{stroke:#111;stroke-width:3;fill:none}
      .thin{stroke:#444;stroke-width:2;fill:none}
      .box{fill:#fff;stroke:#111;stroke-width:3;rx:18}
      .soft{fill:#f5f5f5;stroke:#111;stroke-width:2;rx:14}
      .dark{fill:#111}
      .title{font:700 52px "Microsoft YaHei",Arial,sans-serif;fill:#111}
      .h{font:700 30px "Microsoft YaHei",Arial,sans-serif;fill:#111}
      .t{font:400 24px "Microsoft YaHei",Arial,sans-serif;fill:#111}
      .s{font:400 20px "Microsoft YaHei",Arial,sans-serif;fill:#333}
      .w{font:700 24px "Microsoft YaHei",Arial,sans-serif;fill:#fff}
      .arrow{stroke:#111;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#111"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="title" x="70" y="95">P3 方案总览</text>
  <line class="line" x1="70" y1="135" x2="1530" y2="135"/>
  
  <rect class="box" x="115" y="330" width="210" height="120"/><text class="h" x="143" y="378">输入材料</text><text class="s" x="143" y="412">合同 / 证据</text>
  <path class="arrow" d="M330 390 H435"/>
  <rect class="box" x="455" y="330" width="210" height="120"/><text class="h" x="483" y="378">法规检索</text><text class="s" x="483" y="412">法规 / 案例</text>
  <path class="arrow" d="M670 390 H775"/>
  <rect class="box" x="795" y="330" width="210" height="120"/><text class="h" x="823" y="378">DAG 协作</text><text class="s" x="823" y="412">智能体执行</text>
  <path class="arrow" d="M1010 390 H1115"/>
  <rect class="box" x="1135" y="330" width="240" height="120"/><text class="h" x="1163" y="378">结构化成果</text><text class="s" x="1163" y="412">报告 / 文书</text>
  <path class="arrow" d="M1255 455 V560 H795 V485"/>
  <rect class="soft" x="650" y="600" width="290" height="110"/><text class="h" x="678" y="648">审计复核</text><text class="s" x="678" y="682">Replay / Snapshot / Audit</text>
  <rect class="soft" x="300" y="765" width="1000" height="66"/>
  <text class="h" x="390" y="806">材料、依据、流程、交付、复核形成连续任务链路</text>

</svg>
