<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg{fill:#fff}
      .line{stroke:#111;stroke-width:3;fill:none}
      .thin{stroke:#444;stroke-width:2;fill:none}
      .box{fill:#fff;stroke:#111;stroke-width:3;rx:18}
      .soft{fill:#f5f5f5;stroke:#111;stroke-width:2;rx:14}
      .dark{fill:#111}
      .title{font:700 52px "Microsoft YaHei",Arial,sans-serif;fill:#111}
      .h{font:700 30px "Microsoft YaHei",Arial,sans-serif;fill:#111}
      .t{font:400 24px "Microsoft YaHei",Arial,sans-serif;fill:#111}
      .s{font:400 20px "Microsoft YaHei",Arial,sans-serif;fill:#333}
      .w{font:700 24px "Microsoft YaHei",Arial,sans-serif;fill:#fff}
      .arrow{stroke:#111;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#111"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="title" x="70" y="95">P4 技术架构</text>
  <line class="line" x1="70" y1="135" x2="1530" y2="135"/>
  <rect class="box" x="170" y="205" width="1260" height="80"/><text class="h" x="198" y="253">用户交互层</text><text class="s" x="198" y="287">工作台 / 执行页 / 结果页 / 材料库 / 回放页 / 管理端</text>
<rect class="box" x="170" y="310" width="1260" height="80"/><text class="h" x="198" y="358">后端服务层</text><text class="s" x="198" y="392">上传 / 知识库 / 文书导出 / 审计日志 / 运行配置</text>
<rect class="box" x="170" y="415" width="1260" height="80"/><text class="h" x="198" y="463">智能体编排层</text><text class="s" x="198" y="497">Co-Sight 多智能体 / DAG / 工具调用 / Replay</text>
<rect class="box" x="170" y="520" width="1260" height="80"/><text class="h" x="198" y="568">工具与知识层</text><text class="s" x="198" y="602">法规 RAG / 联网搜索 / 文档处理 / DOCX/PDF 导出</text>
<rect class="box" x="170" y="625" width="1260" height="80"/><text class="h" x="198" y="673">可信与数据层</text><text class="s" x="198" y="707">Execution Snapshot / Audit Log / 权限边界</text>
</svg>
