<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg{fill:#fff}
      .line{stroke:#111;stroke-width:3;fill:none}
      .thin{stroke:#444;stroke-width:2;fill:none}
      .box{fill:#fff;stroke:#111;stroke-width:3;rx:18}
      .soft{fill:#f5f5f5;stroke:#111;stroke-width:2;rx:14}
      .dark{fill:#111}
      .title{font:700 52px "Microsoft YaHei",Arial,sans-serif;fill:#111}
      .h{font:700 30px "Microsoft YaHei",Arial,sans-serif;fill:#111}
      .t{font:400 24px "Microsoft YaHei",Arial,sans-serif;fill:#111}
      .s{font:400 20px "Microsoft YaHei",Arial,sans-serif;fill:#333}
      .w{font:700 24px "Microsoft YaHei",Arial,sans-serif;fill:#fff}
      .arrow{stroke:#111;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#111"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="title" x="70" y="95">P5 Co-Sight 改进对比</text>
  <line class="line" x1="70" y1="135" x2="1530" y2="135"/>
  
  <rect class="box" x="95" y="205" width="1410" height="420"/>
  <text class="h" x="150" y="270">维度</text><text class="h" x="500" y="270">原生 Co-Sight</text><text class="h" x="970" y="270">律枢 LexHub</text>
  <line class="line" x1="130" y1="300" x2="1470" y2="300"/>
  <text class="t" x="150" y="360">产品定位</text><text class="t" x="500" y="360">通用任务执行框架</text><text class="t" x="970" y="360">法律业务智能服务平台</text>
  <text class="t" x="150" y="435">任务流程</text><text class="t" x="500" y="435">通用 Agent / Tool / Replay</text><text class="t" x="970" y="435">法律 DAG + 导出前复核</text>
  <text class="t" x="150" y="510">工具体系</text><text class="t" x="500" y="510">搜索 / 文件 / 代码执行</text><text class="t" x="970" y="510">法规 RAG / 材料库 / 文书导出</text>
  <text class="t" x="150" y="585">展示交付</text><text class="t" x="500" y="585">执行日志与 replay</text><text class="t" x="970" y="585">工作台 / 结果页 / 审计链</text>
  <rect class="soft" x="190" y="720" width="1220" height="70"/>
  <text class="h" x="265" y="765">继承底座能力 + 法律工作流 + 知识库工具 + 业务页面 + 审计交付</text>

</svg>
