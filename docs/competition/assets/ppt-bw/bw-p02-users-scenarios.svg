<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg{fill:#fff}
      .line{stroke:#111;stroke-width:3;fill:none}
      .thin{stroke:#444;stroke-width:2;fill:none}
      .box{fill:#fff;stroke:#111;stroke-width:3;rx:18}
      .soft{fill:#f5f5f5;stroke:#111;stroke-width:2;rx:14}
      .dark{fill:#111}
      .title{font:700 52px "Microsoft YaHei",Arial,sans-serif;fill:#111}
      .h{font:700 30px "Microsoft YaHei",Arial,sans-serif;fill:#111}
      .t{font:400 24px "Microsoft YaHei",Arial,sans-serif;fill:#111}
      .s{font:400 20px "Microsoft YaHei",Arial,sans-serif;fill:#333}
      .w{font:700 24px "Microsoft YaHei",Arial,sans-serif;fill:#fff}
      .arrow{stroke:#111;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#111"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="title" x="70" y="95">P2 目标场景与用户</text>
  <line class="line" x1="70" y1="135" x2="1530" y2="135"/>
  
  <rect class="box" x="100" y="205" width="360" height="470"/><text class="h" x="128" y="253">目标用户</text>
  <text class="t" x="165" y="310">个人律师</text>
  <text class="t" x="165" y="385">律所团队</text>
  <text class="t" x="165" y="460">企业法务</text>
  <text class="t" x="165" y="535">合规人员</text>
  <rect class="box" x="520" y="205" width="980" height="470"/><text class="h" x="548" y="253">重点场景与交付物</text>
  <line class="thin" x1="580" y1="330" x2="1440" y2="330"/>
  <text class="h" x="600" y="305">场景</text><text class="h" x="900" y="305">输入材料</text><text class="h" x="1200" y="305">输出结果</text>
  <text class="t" x="600" y="380">劳动争议</text><text class="t" x="900" y="380">通知 / 考勤 / 工资</text><text class="t" x="1200" y="380">争议焦点 / 证据缺口</text>
  <text class="t" x="600" y="450">公司治理</text><text class="t" x="900" y="450">股权 / 决议 / 章程</text><text class="t" x="1200" y="450">程序风险 / 补正建议</text>
  <text class="t" x="600" y="520">数据合规</text><text class="t" x="900" y="520">SDK / 投诉 / 评估</text><text class="t" x="1200" y="520">风险分级 / 整改建议</text>
  <text class="t" x="600" y="590">合同审查</text><text class="t" x="900" y="590">合同 / 协议 / 履约</text><text class="t" x="1200" y="590">条款风险 / 审查报告</text>
  <rect class="soft" x="130" y="730" width="1340" height="64"/>
  <text class="s" x="165" y="770">覆盖：通用分析、材料解读、合同审查、公司事务、争议解决、合规知产、法规研究、文书起草</text>

</svg>
