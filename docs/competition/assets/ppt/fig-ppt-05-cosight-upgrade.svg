<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg{fill:#f6f8fa}.navy{fill:#123a63}.teal{fill:#1c8ca8}.gold{fill:#d99a2b}.white{fill:#fff}
      .title{font:700 54px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.sub{font:400 25px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}
      .h{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.t{font:400 25px "Microsoft YaHei",Arial,sans-serif;fill:#26384d}.wh{font:700 27px "Microsoft YaHei",Arial,sans-serif;fill:#fff}
      .panel{fill:#fff;stroke:#123a63;stroke-width:3;rx:22}.panelT{fill:#fff;stroke:#1c8ca8;stroke-width:3;rx:22}.panelG{fill:#fff;stroke:#d99a2b;stroke-width:3;rx:22}
      .arrow{stroke:#123a63;stroke-width:6;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto"><path d="M0,0 L14,7 L0,14 Z" fill="#123a63"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <rect class="navy" x="54" y="40" width="86" height="86" rx="10"/><text class="white" x="83" y="99" font-size="52" font-weight="700">5</text>
  <text class="title" x="165" y="86">底座改造</text><text class="sub" x="168" y="122">从通用智能体框架，到法律行业双端应用系统</text>
  <line x1="55" y1="150" x2="1540" y2="150" stroke="#123a63" stroke-width="4"/>
  <g transform="translate(95,245)">
    <rect class="panel" x="0" y="0" width="390" height="330"/>
    <text class="h" x="95" y="68">原生 Co-Sight</text>
    <text class="t" x="78" y="135">通用智能体底座</text>
    <text class="t" x="78" y="190">Planner / Actor</text>
    <text class="t" x="78" y="245">Tool Call / Replay</text>
    <path class="arrow" d="M410 165 H515"/>
    <rect class="panelT" x="535" y="0" width="390" height="330"/>
    <text class="h" x="625" y="68">LexHub 改造</text>
    <text class="t" x="600" y="135">法律场景入口</text>
    <text class="t" x="600" y="190">法律 DAG 工作流</text>
    <text class="t" x="600" y="245">法规工具与文书导出</text>
    <path class="arrow" d="M945 165 H1050"/>
    <rect class="panelG" x="1070" y="0" width="390" height="330"/>
    <text class="h" x="1160" y="68">最终形态</text>
    <text class="t" x="1135" y="135">用户端工作台</text>
    <text class="t" x="1135" y="190">管理端控制台</text>
    <text class="t" x="1135" y="245">可回放法律交付系统</text>
  </g>
  <g transform="translate(160,690)">
    <rect class="navy" x="0" y="0" width="230" height="62" rx="31"/><text class="wh" x="75" y="40">场景化</text>
    <rect class="teal" x="270" y="0" width="230" height="62" rx="31"/><text class="wh" x="345" y="40">工作流化</text>
    <rect class="navy" x="540" y="0" width="230" height="62" rx="31"/><text class="wh" x="615" y="40">知识增强</text>
    <rect class="teal" x="810" y="0" width="230" height="62" rx="31"/><text class="wh" x="870" y="40">双端产品化</text>
    <rect class="gold" x="1080" y="0" width="230" height="62" rx="31"/><text class="wh" x="1140" y="40">可信交付</text>
  </g>
</svg>
