<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg{fill:#f6f8fa}.navy{fill:#123a63}.teal{fill:#1c8ca8}.gold{fill:#d99a2b}.white{fill:#fff}
      .title{font:700 54px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.sub{font:400 25px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}
      .center{font:700 40px "Microsoft YaHei",Arial,sans-serif;fill:#fff}.h{font:700 32px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.t{font:400 24px "Microsoft YaHei",Arial,sans-serif;fill:#26384d}.wh{font:700 27px "Microsoft YaHei",Arial,sans-serif;fill:#fff}
      .card{fill:#fff;stroke:#123a63;stroke-width:3;rx:20}.line{stroke:#1c8ca8;stroke-width:5;fill:none}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <rect class="navy" x="54" y="40" width="86" height="86" rx="10"/><text class="white" x="70" y="99" font-size="52" font-weight="700">13</text>
  <text class="title" x="165" y="86">社会价值</text><text class="sub" x="168" y="122">让法律服务更高效、更透明、更容易被复核</text>
  <line x1="55" y1="150" x2="1540" y2="150" stroke="#123a63" stroke-width="4"/>
