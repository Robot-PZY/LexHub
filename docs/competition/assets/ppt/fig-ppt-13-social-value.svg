  <text class="center" x="665" y="430">可编排</text><text class="center" x="745" y="490">可追溯</text><text class="center" x="825" y="550">可交付</text>
  <path class="line" d="M690 350 L500 260"/><path class="line" d="M910 350 L1100 260"/><path class="line" d="M690 560 L500 650"/><path class="line" d="M910 560 L1100 650"/>
  <rect class="card" x="240" y="210" width="360" height="145"/><text class="h" x="358" y="270">降低门槛</text><text class="t" x="292" y="320">基础法律材料整理能力</text>
  <rect class="card" x="1000" y="210" width="360" height="145"/><text class="h" x="1118" y="270">提升效率</text><text class="t" x="1040" y="320">减少重复检索与初稿整理</text>
