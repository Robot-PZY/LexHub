<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg{fill:#f6f8fa}.navy{fill:#123a63}.teal{fill:#1c8ca8}.gold{fill:#d99a2b}.white{fill:#fff}.muted{fill:#eef2f5}
      .title{font:700 54px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.sub{font:400 25px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}
      .h{font:700 28px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.t{font:700 24px "Microsoft YaHei",Arial,sans-serif;fill:#26384d}.small{font:700 21px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}
      .node{fill:#fff;stroke:#123a63;stroke-width:3;rx:16}.node2{fill:#fff;stroke:#1c8ca8;stroke-width:3;rx:16}.node3{fill:#fff;stroke:#d99a2b;stroke-width:3;rx:16}
      .arrow{stroke:#123a63;stroke-width:5;fill:none;marker-end:url(#arrow)}.branch{stroke:#1c8ca8;stroke-width:5;fill:none;marker-end:url(#arrowT)}.goldline{stroke:#d99a2b;stroke-width:5;fill:none;marker-end:url(#arrowG)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#123a63"/></marker>
    <marker id="arrowT" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#1c8ca8"/></marker>
    <marker id="arrowG" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#d99a2b"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <rect class="navy" x="54" y="40" width="86" height="86" rx="10"/><text class="white" x="83" y="99" font-size="52" font-weight="700">8</text>
  <text class="title" x="165" y="86">DAG 编排</text><text class="sub" x="168" y="122">任务按状态动态流转，不是固定流水线</text>
  <line x1="55" y1="150" x2="1540" y2="150" stroke="#123a63" stroke-width="4"/>
  <g>
    <rect class="node" x="90" y="260" width="170" height="86"/><text class="h" x="120" y="314">任务输入</text>
    <path class="arrow" d="M265 303 H330"/>
    <rect class="node" x="345" y="260" width="170" height="86"/><text class="h" x="375" y="314">任务理解</text>
    <path class="arrow" d="M520 303 H585"/>
    <polygon points="680,220 790,303 680,386 570,303" fill="#fff" stroke="#1c8ca8" stroke-width="4"/>
    <text class="h" x="610" y="295">材料完整</text><text class="h" x="625" y="330">度判断</text>
    <path class="branch" d="M790 303 H890"/><text class="small" x="810" y="275">材料完整</text>
    <rect class="node" x="905" y="260" width="170" height="86"/><text class="h" x="935" y="314">法规研究</text>
    <path class="arrow" d="M1080 303 H1145"/>
    <rect class="node" x="1160" y="260" width="170" height="86"/><text class="h" x="1190" y="314">文书生成</text>
  </g>
  <path class="branch" d="M680 386 V515"/><text class="small" x="705" y="445">材料不足</text>
  <rect class="node2" x="510" y="520" width="160" height="82"/><text class="h" x="535" y="572">证据质检</text>
  <path class="branch" d="M675 561 H755"/>
  <rect class="node2" x="770" y="520" width="160" height="82"/><text class="h" x="795" y="572">缺口清单</text>
  <path class="branch" d="M935 561 H1015"/>
  <rect class="node2" x="1030" y="520" width="160" height="82"/><text class="h" x="1055" y="572">材料补充</text>
  <path class="branch" d="M1110 520 V410 H680 V390"/>
  <path class="goldline" d="M1245 346 V430"/>
  <rect class="node3" x="1160" y="445" width="170" height="80"/><text class="h" x="1190" y="496">交叉审查</text>
  <path class="goldline" d="M1245 525 V610"/>
  <rect class="node3" x="1160" y="625" width="170" height="80"/><text class="h" x="1190" y="676">合规监测</text>
  <path class="goldline" d="M1245 705 V775 H1390"/>
  <rect class="node" x="1400" y="735" width="150" height="80"/><text class="h" x="1423" y="786">结果导出</text>
  <rect x="70" y="650" width="600" height="170" rx="18" fill="#fff" stroke="#1c8ca8" stroke-width="3" stroke-dasharray="9 7"/>
  <text class="h" x="105" y="700">条件触发规则</text>
  <text class="t" x="110" y="742">1 材料完整度不足：触发证据质检</text>
  <text class="t" x="110" y="780">2 法规引用不足：触发法规研究</text>
  <text class="t" x="110" y="818">3 高风险或导出前：触发交叉审查与合规监测</text>
  <rect x="1360" y="230" width="180" height="420" rx="18" fill="#fff" stroke="#123a63" stroke-width="3"/>
  <text class="h" x="1393" y="280">工具能力</text>
  <text class="small" x="1395" y="340">联网搜索</text><text class="small" x="1395" y="400">法规检索</text><text class="small" x="1395" y="460">文档处理</text><text class="small" x="1395" y="520">代码执行</text><text class="small" x="1395" y="580">文书导出</text>
</svg>
