<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs><style>
    .bg{fill:#f6f8fa}.navy{fill:#123a63}.teal{fill:#1c8ca8}.gold{fill:#d99a2b}.white{fill:#fff}
    .title{font:700 56px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.h{font:700 29px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.t{font:400 23px "Microsoft YaHei",Arial,sans-serif;fill:#26384d}.wh{font:700 28px "Microsoft YaHei",Arial,sans-serif;fill:#fff}
    .card{fill:#fff;stroke:#123a63;stroke-width:3;rx:18}.cardT{fill:#fff;stroke:#1c8ca8;stroke-width:3;rx:18}
  </style></defs>
  <rect class="bg" width="1600" height="900"/>
  <rect class="navy" x="54" y="40" width="86" height="86" rx="10"/><text class="white" x="70" y="99" font-size="52" font-weight="700">13</text>
  <text class="title" x="165" y="98">总结与交付成果</text><line x1="55" y1="155" x2="1540" y2="155" stroke="#123a63" stroke-width="4"/>
  <g transform="translate(120,230)">
    <rect class="card" x="0" y="0" width="300" height="120"/><text class="h" x="95" y="60">前端工程</text><text class="t" x="75" y="95">用户端 / 管理端</text>
    <rect class="cardT" x="350" y="0" width="300" height="120"/><text class="h" x="445" y="60">后端工程</text><text class="t" x="420" y="95">接口 / 服务 / 审计</text>
    <rect class="card" x="700" y="0" width="300" height="120"/><text class="h" x="795" y="60">工作流配置</text><text class="t" x="780" y="95">legal-workflow</text>
    <rect class="cardT" x="1050" y="0" width="300" height="120"/><text class="h" x="1145" y="60">智能体配置</text><text class="t" x="1130" y="95">agent-registry</text>
    <rect class="cardT" x="0" y="170" width="300" height="120"/><text class="h" x="95" y="230">自定义工具</text><text class="t" x="65" y="265">法律检索 / 文书导出</text>
    <rect class="card" x="350" y="170" width="300" height="120"/><text class="h" x="445" y="230">测试材料</text><text class="t" x="430" y="265">三类演示场景</text>
    <rect class="cardT" x="700" y="170" width="300" height="120"/><text class="h" x="795" y="230">技术文档</text><text class="t" x="770" y="265">方案 / 创新总结</text>
    <rect class="card" x="1050" y="170" width="300" height="120"/><text class="h" x="1145" y="230">答辩材料</text><text class="t" x="1125" y="265">PPT / 演示脚本</text>
  </g>
  <rect class="navy" x="270" y="685" width="1060" height="82" rx="20"/>
  <text class="wh" x="390" y="736">LexHub 已形成可运行、可复核、可继续扩展的竞赛交付</text>
</svg>
