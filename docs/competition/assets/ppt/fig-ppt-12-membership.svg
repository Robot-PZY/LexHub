<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg{fill:#f6f8fa}.navy{fill:#123a63}.teal{fill:#1c8ca8}.gold{fill:#d99a2b}.white{fill:#fff}.gray{fill:#eef2f5}
      .title{font:700 54px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.sub{font:400 25px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}
      .h{font:700 30px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.t{font:400 24px "Microsoft YaHei",Arial,sans-serif;fill:#26384d}.wh{font:700 27px "Microsoft YaHei",Arial,sans-serif;fill:#fff}
      .card{fill:#fff;stroke:#123a63;stroke-width:3;rx:22}.cardT{fill:#fff;stroke:#1c8ca8;stroke-width:4;rx:22}.cardG{fill:#fff;stroke:#d99a2b;stroke-width:4;rx:22}
      .pill{fill:#eef6f8;stroke:#1c8ca8;stroke-width:2;rx:18}.arrow{stroke:#123a63;stroke-width:5;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#123a63"/></marker>
