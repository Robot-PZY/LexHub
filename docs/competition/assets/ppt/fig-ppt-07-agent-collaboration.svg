  <rect class="nodeT" x="990" y="600" width="270" height="100"/><text class="h" x="1045" y="658">结果交付</text><text class="t" x="1040" y="688">导出与归档</text>
  <rect class="navy" x="280" y="790" width="1040" height="58" rx="29"/>
  <text class="wh" x="420" y="828">6 类智能体协作，覆盖事实、依据、文书、复核、审计</text>
