  </g>

  <line class="dash" x1="970" y1="36" x2="970" y2="596"/>

  <g transform="translate(1010,38)">
    <rect class="pain" x="0" y="0" width="560" height="150"/>
    <circle class="gold" cx="74" cy="75" r="45"/><circle class="gold2" cx="64" cy="63" r="34" opacity=".55"/>
    <text class="num" x="60" y="94">1</text>
    <line x1="148" y1="28" x2="148" y2="122" stroke="#7a8798" stroke-width="3"/>
    <text class="h" x="185" y="70">效率低</text>
    <text class="t" x="185" y="112">合同审查、争议整理耗时长</text>
  </g>
  <g transform="translate(1010,238)">
    <rect class="pain" x="0" y="0" width="560" height="150"/>
    <circle class="gold" cx="74" cy="75" r="45"/><circle class="gold2" cx="64" cy="63" r="34" opacity=".55"/>
    <text class="num" x="60" y="94">2</text>
    <line x1="148" y1="28" x2="148" y2="122" stroke="#7a8798" stroke-width="3"/>
    <text class="h" x="185" y="70">过程不透明</text>
    <text class="t" x="185" y="112">执行过程难复盘、难追责、难审核</text>
  </g>
  <g transform="translate(1010,438)">
    <rect class="pain" x="0" y="0" width="560" height="150"/>
    <circle class="gold" cx="74" cy="75" r="45"/><circle class="gold2" cx="64" cy="63" r="34" opacity=".55"/>
    <text class="num" x="60" y="94">3</text>
    <line x1="148" y1="28" x2="148" y2="122" stroke="#7a8798" stroke-width="3"/>
