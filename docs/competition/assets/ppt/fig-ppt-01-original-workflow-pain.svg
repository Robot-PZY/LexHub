  <polygon class="arrow" points="178,318 212,342 178,366"/>
  <g transform="translate(230,185)">
    <rect class="card" x="0" y="0" width="138" height="285"/>
    <circle class="teal" cx="69" cy="42" r="22"/><text class="num" x="55" y="59" font-size="30">2</text>
    <path class="thin" d="M42 100 h70 v92 h-70 z M56 127 h42 M56 153 h32 M56 179 h26"/>
    <circle class="thin" cx="94" cy="170" r="32"/><path class="thin" d="M118 194 l28 28"/>
