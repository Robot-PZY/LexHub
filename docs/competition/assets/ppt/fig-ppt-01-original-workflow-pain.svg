  </g>
  <polygon class="arrow" points="676,318 710,342 676,366"/>
  <g transform="translate(728,185)">
    <rect class="card" x="0" y="0" width="138" height="285"/>
    <circle class="teal" cx="69" cy="42" r="22"/><text class="num" x="55" y="59" font-size="30">5</text>
    <path class="thin" d="M42 108 h72 v102 h-72 z M58 132 h38 M58 158 h30 M58 184 h26"/>
    <circle class="thin" cx="108" cy="190" r="30"/><path class="thin" d="M92 190 l12 12 22-26"/>
