  <polygon class="arrow" points="344,318 378,342 344,366"/>
  <g transform="translate(396,185)">
    <rect class="card" x="0" y="0" width="138" height="285"/>
    <circle class="teal" cx="69" cy="42" r="22"/><text class="num" x="55" y="59" font-size="30">3</text>
    <path class="thin" d="M42 108 h72 v102 h-72 z M58 134 l10 10 18-22 M58 164 l10 10 18-22 M58 194 l10 10 18-22"/>
