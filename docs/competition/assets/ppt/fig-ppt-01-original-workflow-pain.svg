  </g>
  <polygon class="arrow" points="510,318 544,342 510,366"/>
  <g transform="translate(562,185)">
    <rect class="card" x="0" y="0" width="138" height="285"/>
    <circle class="teal" cx="69" cy="42" r="22"/><text class="num" x="55" y="59" font-size="30">4</text>
    <path class="thin" d="M42 100 h70 l18 18 v92 h-88 z M112 100 v22 h20 M58 136 h42 M58 162 h42 M58 188 h30"/>
    <path class="thin" d="M100 190 l42-42 16 16 -42 42 -22 6 z"/>
