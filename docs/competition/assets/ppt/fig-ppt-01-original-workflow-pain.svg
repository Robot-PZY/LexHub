    <text class="t" x="185" y="112">报告和文书整理依赖人工</text>
  </g>

  <rect class="panel" x="26" y="660" width="1548" height="170"/>
  <path class="thin" d="M118 710 l42 -28 l42 28 v48 c0 42 -42 68 -42 68 s-42 -26 -42 -68 z"/>
  <circle class="teal" cx="160" cy="760" r="28"/><path class="thin" d="M145 760 l12 13 24 -28" stroke="#fff"/>
  <text class="bottom" x="255" y="765">法律业务需要</text>
  <text class="bottomGold" x="570" y="765">“事实、依据、过程、交付”</text>
  <text class="bottom" x="1260" y="765">的完整链路</text>
