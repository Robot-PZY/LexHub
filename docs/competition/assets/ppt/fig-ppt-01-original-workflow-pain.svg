<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg{fill:#fff}
      .navy{fill:#082451}
      .teal{fill:#1b9a97}
      .gold{fill:#d99a1f}
      .gold2{fill:#f1bd34}
      .white{fill:#fff}
      .panel{fill:#fff;stroke:#082451;stroke-width:3.2;rx:26}
      .card{fill:#fff;stroke:#082451;stroke-width:3;rx:16}
      .pain{fill:#fff;stroke:#082451;stroke-width:3;rx:18}
      .thin{stroke:#082451;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .arrow{fill:#1b9a97}
      .dash{stroke:#1b9a97;stroke-width:2.6;stroke-dasharray:8 9}
      .title{font:700 38px "Microsoft YaHei",Arial,sans-serif;fill:#082451}
      .h{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#082451}
      .t{font:400 24px "Microsoft YaHei",Arial,sans-serif;fill:#26384d}
      .label{font:700 28px "Microsoft YaHei",Arial,sans-serif;fill:#082451}
      .num{font:700 48px "Microsoft YaHei",Arial,sans-serif;fill:#fff}
      .bottom{font:700 40px "Microsoft YaHei",Arial,sans-serif;fill:#082451}
      .bottomGold{font:700 46px "Microsoft YaHei",Arial,sans-serif;fill:#b97800}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>

  <rect class="panel" x="26" y="36" width="910" height="560"/>
