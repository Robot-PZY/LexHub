<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs><style>
    .bg{fill:#f6f8fa}.navy{fill:#123a63}.teal{fill:#1c8ca8}.gold{fill:#d99a2b}.white{fill:#fff}.gray{fill:#eef2f5}
    .title{font:700 54px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.h{font:700 28px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.t{font:400 22px "Microsoft YaHei",Arial,sans-serif;fill:#26384d}.wh{font:700 24px "Microsoft YaHei",Arial,sans-serif;fill:#fff}
    .browser{fill:#fff;stroke:#123a63;stroke-width:3;rx:18}.bar{fill:#123a63}.box{fill:#fff;stroke:#1c8ca8;stroke-width:3;rx:14}.side{fill:#fff;stroke:#d7e0ea;stroke-width:2;rx:14}
    .arrow{stroke:#123a63;stroke-width:5;fill:none;marker-end:url(#a)}
  </style><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#123a63"/></marker></defs>
  <rect class="bg" width="1600" height="900"/><rect class="navy" x="54" y="40" width="86" height="86" rx="10"/><text class="white" x="70" y="99" font-size="52" font-weight="700">10</text><text class="title" x="165" y="95">用户端闭环</text><line x1="55" y1="150" x2="1540" y2="150" stroke="#123a63" stroke-width="4"/>
  <rect class="browser" x="75" y="205" width="1050" height="520"/><rect class="bar" x="75" y="205" width="1050" height="72" rx="18"/><text class="wh" x="120" y="250">LexHub · 任务工作台</text>
  <rect class="gray" x="105" y="305" width="190" height="380" rx="12"/><text class="h" x="135" y="365">工作台</text><text class="t" x="135" y="430">我的任务</text><text class="t" x="135" y="490">执行中</text><text class="t" x="135" y="550">材料库</text>
  <rect class="box" x="335" y="315" width="735" height="82"/><text class="h" x="365" y="368">1 场景选择：合同审查 / 争议解决 / 法规研究 / 文书起草</text>
  <rect class="box" x="335" y="425" width="735" height="92"/><text class="h" x="365" y="480">2 任务描述：目标、事实背景、关注重点、输出要求</text>
  <rect class="box" x="335" y="545" width="735" height="112"/><text class="h" x="365" y="600">3 材料上传：合同、证据、章程、通知书、合规材料</text>
  <g transform="translate(1180,260)">
    <rect class="side" x="0" y="0" width="310" height="78"/><text class="h" x="75" y="50">场景选择</text>
    <rect class="side" x="0" y="105" width="310" height="78"/><text class="h" x="75" y="155">任务描述</text>
    <rect class="side" x="0" y="210" width="310" height="78"/><text class="h" x="75" y="260">材料上传</text>
    <rect class="side" x="0" y="315" width="310" height="78"/><text class="h" x="75" y="365">DAG 执行</text>
    <rect class="side" x="0" y="420" width="310" height="78"/><text class="h" x="75" y="470">结果导出</text>
  </g>
  <g transform="translate(120,790)">
    <rect class="navy" x="0" y="0" width="190" height="54" rx="27"/><text class="wh" x="45" y="35">任务输入</text><path class="arrow" d="M205 27 H280"/>
    <rect class="teal" x="295" y="0" width="190" height="54" rx="27"/><text class="wh" x="345" y="35">Plan 拆解</text><path class="arrow" d="M500 27 H575"/>
    <rect class="navy" x="590" y="0" width="190" height="54" rx="27"/><text class="wh" x="630" y="35">Tool Call</text><path class="arrow" d="M795 27 H870"/>
    <rect class="teal" x="885" y="0" width="210" height="54" rx="27"/><text class="wh" x="930" y="35">Agent Result</text><path class="arrow" d="M1110 27 H1185"/>
    <rect class="gold" x="1200" y="0" width="190" height="54" rx="27"/><text class="wh" x="1255" y="35">Replay</text>
  </g>
</svg>
