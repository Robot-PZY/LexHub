<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg{fill:#f6f8fa}.navy{fill:#123a63}.teal{fill:#1c8ca8}.gold{fill:#d99a2b}.white{fill:#fff}
      .title{font:700 54px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.sub{font:400 25px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}
      .h{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.t{font:400 27px "Microsoft YaHei",Arial,sans-serif;fill:#26384d}
      .item{font:700 26px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.cap{font:700 28px "Microsoft YaHei",Arial,sans-serif;fill:#fff}
      .panel{fill:#fff;stroke:#123a63;stroke-width:3;rx:22}.panel2{fill:#fff;stroke:#1c8ca8;stroke-width:3;rx:22}.bar{fill:#123a63;rx:20}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <rect class="navy" x="54" y="40" width="86" height="86" rx="10"/><text class="white" x="83" y="99" font-size="52" font-weight="700">4</text>
  <text class="title" x="165" y="86">双端架构</text><text class="sub" x="168" y="122">用户端负责办任务，管理端负责管能力</text>
  <line x1="55" y1="150" x2="1540" y2="150" stroke="#123a63" stroke-width="4"/>
  <rect class="panel2" x="95" y="210" width="640" height="455" rx="24"/>
  <rect class="panel" x="865" y="210" width="640" height="455" rx="24"/>
  <text class="h" x="295" y="275">用户端 User Portal</text>
  <text class="h" x="1050" y="275">管理端 Admin Console</text>
  <g>
    <circle class="teal" cx="165" cy="350" r="22"/><text class="white" x="158" y="359" font-size="24" font-weight="700">1</text><text class="item" x="210" y="360">场景选择</text>
    <circle class="teal" cx="165" cy="420" r="22"/><text class="white" x="158" y="429" font-size="24" font-weight="700">2</text><text class="item" x="210" y="430">任务描述</text>
    <circle class="teal" cx="165" cy="490" r="22"/><text class="white" x="158" y="499" font-size="24" font-weight="700">3</text><text class="item" x="210" y="500">材料上传</text>
    <circle class="teal" cx="165" cy="560" r="22"/><text class="white" x="158" y="569" font-size="24" font-weight="700">4</text><text class="item" x="210" y="570">DAG 执行跟踪</text>
    <circle class="teal" cx="165" cy="630" r="22"/><text class="white" x="158" y="639" font-size="24" font-weight="700">5</text><text class="item" x="210" y="640">结果查看与导出</text>
  </g>
  <g>
    <circle class="gold" cx="935" cy="350" r="22"/><text class="white" x="928" y="359" font-size="24" font-weight="700">1</text><text class="item" x="980" y="360">模型与 API 配置</text>
    <circle class="gold" cx="935" cy="420" r="22"/><text class="white" x="928" y="429" font-size="24" font-weight="700">2</text><text class="item" x="980" y="430">法律知识库维护</text>
    <circle class="gold" cx="935" cy="490" r="22"/><text class="white" x="928" y="499" font-size="24" font-weight="700">3</text><text class="item" x="980" y="500">工作流与策略规则</text>
    <circle class="gold" cx="935" cy="560" r="22"/><text class="white" x="928" y="569" font-size="24" font-weight="700">4</text><text class="item" x="980" y="570">智能体与工具目录</text>
    <circle class="gold" cx="935" cy="630" r="22"/><text class="white" x="928" y="639" font-size="24" font-weight="700">5</text><text class="item" x="980" y="640">用户与会员标注</text>
  </g>
  <rect class="bar" x="145" y="735" width="1310" height="86" rx="20"/>
  <text class="cap" x="330" y="789">共享中台：FastAPI + Co-Sight 执行引擎 + Legal KB + Replay / Audit</text>
</svg>
