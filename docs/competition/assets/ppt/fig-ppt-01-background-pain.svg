<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs><style>
    .bg{fill:#f6f8fa}.navy{fill:#123a63}.teal{fill:#1c8ca8}.gold{fill:#d99a2b}.white{fill:#fff}.light{fill:#fff}.soft{fill:#eef6f8}.warn{fill:#fff8e8}
    .title{font:700 56px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.h{font:700 31px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.t{font:400 25px "Microsoft YaHei",Arial,sans-serif;fill:#26384d}.small{font:700 22px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.wh{font:700 26px "Microsoft YaHei",Arial,sans-serif;fill:#fff}
    .panel{fill:#fff;stroke:#d7e0ea;stroke-width:3;rx:20}.left{fill:#fff;stroke:#d99a2b;stroke-width:3;rx:18}.right{fill:#fff;stroke:#1c8ca8;stroke-width:3;rx:18}
    .arrow{stroke:#123a63;stroke-width:6;fill:none;marker-end:url(#a)}
  </style><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#123a63"/></marker></defs>
  <rect class="bg" width="1600" height="900"/>
  <rect class="navy" x="54" y="40" width="86" height="86" rx="10"/><text class="white" x="83" y="99" font-size="52" font-weight="700">1</text>
  <text class="title" x="165" y="98">业务背景与痛点</text><line x1="55" y1="155" x2="1540" y2="155" stroke="#123a63" stroke-width="4"/>
  <rect class="panel" x="80" y="210" width="1440" height="520"/>
  <rect class="left" x="130" y="270" width="560" height="360"/>
  <text class="h" x="290" y="330">传统法律工作方式</text>
  <text class="t" x="190" y="400">材料分散：文件、聊天记录、检索结果分离</text>
  <text class="t" x="190" y="465">依据难追溯：法规、案例、观点散落各处</text>
  <text class="t" x="190" y="530">过程不可见：只看到结论，难复盘执行过程</text>
  <text class="t" x="190" y="595">文书整理耗时：事实、依据、模板人工拼接</text>
  <path class="arrow" d="M715 450 H885"/>
  <rect class="right" x="910" y="270" width="560" height="360"/>
  <text class="h" x="1115" y="330">LexHub 工作方式</text>
  <text class="t" x="970" y="400">工作台统一接入任务与材料</text>
  <text class="t" x="970" y="465">法规 RAG、来源摘要和引用记录</text>
  <text class="t" x="970" y="530">DAG、工具轨迹、Replay 回放</text>
  <text class="t" x="970" y="595">结构化报告与 DOCX/PDF 导出</text>
  <rect class="navy" x="190" y="775" width="1220" height="70" rx="18"/>
  <text class="wh" x="290" y="820">LexHub 将材料接入、依据检索、流程执行和结果交付统一到工作台</text>
</svg>
