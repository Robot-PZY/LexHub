    .title{font:700 54px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.h{font:700 28px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.t{font:400 23px "Microsoft YaHei",Arial,sans-serif;fill:#26384d}.wh{font:700 24px "Microsoft YaHei",Arial,sans-serif;fill:#fff}
    .browser{fill:#fff;stroke:#123a63;stroke-width:3;rx:18}.bar{fill:#123a63}.card{fill:#fff;stroke:#d7e0ea;stroke-width:2;rx:14}.panel{fill:#fff;stroke:#1c8ca8;stroke-width:3;rx:16}
  </style></defs>
  <rect class="bg" width="1600" height="900"/><rect class="navy" x="54" y="40" width="86" height="86" rx="10"/><text class="white" x="70" y="99" font-size="52" font-weight="700">11</text><text class="title" x="165" y="95">管理端支撑</text><line x1="55" y1="150" x2="1540" y2="150" stroke="#123a63" stroke-width="4"/>
