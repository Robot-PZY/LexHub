<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg{fill:#f6f8fa}.navy{fill:#123a63}.teal{fill:#1c8ca8}.gold{fill:#d99a2b}.white{fill:#fff}
      .box{fill:#fff;stroke:#123a63;stroke-width:3;rx:18}.soft{fill:#eef6f8;stroke:#1c8ca8;stroke-width:2;rx:16}
      .title{font:700 54px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.sub{font:400 25px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}
      .h{font:700 30px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.t{font:400 24px "Microsoft YaHei",Arial,sans-serif;fill:#26384d}
      .small{font:700 22px "Microsoft YaHei",Arial,sans-serif;fill:#fff}.tag{font:700 21px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}
      .arrow{stroke:#123a63;stroke-width:5;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#123a63"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <rect class="navy" x="54" y="40" width="86" height="86" rx="10"/>
  <text class="white" x="83" y="99" font-size="52" font-weight="700">1</text>
  <text class="title" x="165" y="86">需求来源</text>
  <text class="sub" x="168" y="122">法律业务通常包含材料整理、依据检索、流程推进和结果交付</text>
  <line x1="55" y1="150" x2="1540" y2="150" stroke="#123a63" stroke-width="4"/>

  <rect class="soft" x="70" y="215" width="360" height="420" rx="20"/>
  <text class="h" x="110" y="275">设计动因</text>
  <text class="title" x="110" y="350" font-size="42">法律业务</text>
  <text class="title" x="110" y="410" font-size="42">链路较长</text>
  <text class="t" x="112" y="500">多材料 · 多依据</text>
  <text class="t" x="112" y="545">多流程 · 多交付</text>
  <text class="t" x="112" y="590">需要过程可复核</text>

  <g transform="translate(500,255)">
    <rect class="box" x="0" y="0" width="150" height="96"/><text class="h" x="28" y="59">材料接收</text>
    <path class="arrow" d="M155 48 H218"/>
    <rect class="box" x="230" y="0" width="150" height="96"/><text class="h" x="258" y="59">事实梳理</text>
    <path class="arrow" d="M385 48 H448"/>
    <rect class="box" x="460" y="0" width="150" height="96"/><text class="h" x="488" y="59">法规检索</text>
    <path class="arrow" d="M615 48 H678"/>
    <rect class="box" x="690" y="0" width="150" height="96"/><text class="h" x="718" y="59">风险判断</text>
    <path class="arrow" d="M845 48 H908"/>
    <rect class="box" x="920" y="0" width="150" height="96"/><text class="h" x="948" y="59">文书生成</text>
  </g>
  <g transform="translate(520,405)">
    <rect class="gold" x="0" y="0" width="112" height="48" rx="24"/><text class="small" x="24" y="32">材料散</text>
    <rect class="gold" x="230" y="0" width="112" height="48" rx="24"/><text class="small" x="254" y="32">耗时长</text>
    <rect class="gold" x="460" y="0" width="112" height="48" rx="24"/><text class="small" x="484" y="32">难追溯</text>
    <rect class="gold" x="690" y="0" width="112" height="48" rx="24"/><text class="small" x="714" y="32">主观强</text>
    <rect class="gold" x="920" y="0" width="112" height="48" rx="24"/><text class="small" x="944" y="32">成本高</text>
  </g>
  <rect class="navy" x="72" y="735" width="1456" height="88" rx="18"/>
  <text class="white" x="245" y="790" font-size="34" font-weight="700">LexHub 统一承接材料、依据、流程、交付与复盘环节</text>
</svg>
