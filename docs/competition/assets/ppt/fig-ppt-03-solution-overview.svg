<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs><style>
    .bg{fill:#f6f8fa}.navy{fill:#123a63}.teal{fill:#1c8ca8}.gold{fill:#d99a2b}.white{fill:#fff}
    .title{font:700 56px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.h{font:700 30px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.t{font:400 24px "Microsoft YaHei",Arial,sans-serif;fill:#26384d}.wh{font:700 28px "Microsoft YaHei",Arial,sans-serif;fill:#fff}
    .node{fill:#fff;stroke:#123a63;stroke-width:4;rx:20}.nodeT{fill:#fff;stroke:#1c8ca8;stroke-width:4;rx:20}.nodeG{fill:#fff;stroke:#d99a2b;stroke-width:4;rx:20}.arrow{stroke:#123a63;stroke-width:7;fill:none;marker-end:url(#a)}
  </style><marker id="a" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto"><path d="M0,0 L14,7 L0,14 Z" fill="#123a63"/></marker></defs>
  <rect class="bg" width="1600" height="900"/>
  <rect class="navy" x="54" y="40" width="86" height="86" rx="10"/><text class="white" x="83" y="99" font-size="52" font-weight="700">3</text>
  <text class="title" x="165" y="98">方案总览</text><line x1="55" y1="155" x2="1540" y2="155" stroke="#123a63" stroke-width="4"/>
  <text class="h" x="540" y="240">LexHub 法律任务闭环</text>
  <g transform="translate(105,350)">
    <rect class="node" x="0" y="0" width="230" height="130"/><text class="h" x="58" y="65">输入材料</text><text class="t" x="50" y="105">合同 / 证据</text>
    <path class="arrow" d="M245 65 H335"/>
    <rect class="nodeT" x="350" y="0" width="230" height="130"/><text class="h" x="408" y="65">法规检索</text><text class="t" x="400" y="105">法规 / 案例</text>
    <path class="arrow" d="M595 65 H685"/>
    <rect class="node" x="700" y="0" width="230" height="130"/><text class="h" x="758" y="65">DAG 协作</text><text class="t" x="755" y="105">智能体执行</text>
    <path class="arrow" d="M945 65 H1035"/>
    <rect class="nodeT" x="1050" y="0" width="230" height="130"/><text class="h" x="1090" y="65">结构化成果</text><text class="t" x="1105" y="105">报告 / 文书</text>
    <path class="arrow" d="M1295 65 H1385"/>
    <rect class="nodeG" x="1400" y="0" width="230" height="130"/><text class="h" x="1458" y="65">审计复核</text><text class="t" x="1455" y="105">回放 / 留痕</text>
  </g>
  <rect class="navy" x="300" y="665" width="1000" height="76" rx="20"/>
  <text class="wh" x="345" y="713">材料接入、依据检索、流程执行、结果交付与复盘归档统一完成</text>
