<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg{fill:#f6f8fa}.navy{fill:#123a63}.teal{fill:#1c8ca8}.gold{fill:#d99a2b}.white{fill:#fff}
      .title{font:700 54px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.sub{font:400 25px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}
      .h{font:700 30px "Microsoft YaHei",Arial,sans-serif;fill:#123a63}.t{font:400 24px "Microsoft YaHei",Arial,sans-serif;fill:#26384d}.wh{font:700 25px "Microsoft YaHei",Arial,sans-serif;fill:#fff}
      .layer{fill:#fff;stroke:#123a63;stroke-width:3;rx:16}.side{fill:#fff;stroke:#1c8ca8;stroke-width:3;rx:16}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <rect class="navy" x="54" y="40" width="86" height="86" rx="10"/><text class="white" x="83" y="99" font-size="52" font-weight="700">6</text>
  <text class="title" x="165" y="86">系统架构</text><text class="sub" x="168" y="122">前后端分离，底层复用 Co-Sight，多工具与知识库可扩展</text>
  <line x1="55" y1="150" x2="1540" y2="150" stroke="#123a63" stroke-width="4"/>
  <g transform="translate(105,205)">
    <rect class="layer" x="0" y="0" width="1040" height="92"/><text class="h" x="45" y="58">应用层</text><text class="t" x="235" y="58">用户端 React / 管理端 React</text>
    <rect class="layer" x="0" y="120" width="1040" height="92"/><text class="h" x="45" y="178">服务层</text><text class="t" x="235" y="178">FastAPI / 上传 / 导出 / 审计 / 配置接口</text>
    <rect class="layer" x="0" y="240" width="1040" height="92"/><text class="h" x="45" y="298">执行层</text><text class="t" x="235" y="298">Co-Sight Planner / Actor / Tool Call / Replay</text>
    <rect class="layer" x="0" y="360" width="1040" height="92"/><text class="h" x="45" y="418">工具层</text><text class="t" x="235" y="418">Legal KB / Search API / Document / Export</text>
    <rect class="layer" x="0" y="480" width="1040" height="92"/><text class="h" x="45" y="538">配置层</text><text class="t" x="235" y="538">Workflow / Agent Registry / Settings</text>
  </g>
  <g transform="translate(1230,245)">
    <rect class="side" x="0" y="0" width="255" height="76"/><text class="h" x="78" y="49">LLM</text>
    <rect class="side" x="0" y="105" width="255" height="76"/><text class="h" x="64" y="154">搜索 API</text>
    <rect class="side" x="0" y="210" width="255" height="76"/><text class="h" x="62" y="259">法规知识源</text>
    <rect class="side" x="0" y="315" width="255" height="76"/><text class="h" x="52" y="364">DOCX/PDF</text>
  </g>
  <rect class="navy" x="245" y="810" width="1110" height="56" rx="28"/>
  <text class="wh" x="395" y="846">架构重点：前后端分离 + Co-Sight 执行底座 + 法律知识工具扩展</text>
</svg>
