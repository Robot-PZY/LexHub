<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务回放历史 - 法枢</title>
    <link rel="icon" href="favicon.ico">
    <link href="libs/fontawesome-6.7.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/replay.css">
    <script src="js/auth.js"></script>
    <script>
        window.ensureProtectedAccess();
    </script>
</head>
<body>
    <div class="replay-container">
        <div class="replay-header">
            <div class="replay-header-copy">
                <span class="replay-kicker">历史回放</span>
                <h1><i class="fas fa-history"></i> 任务回放历史</h1>
                <p>查看历史任务、快速回放分析过程，并回到工作台继续追问或补充材料。</p>
            </div>
            <div class="replay-header-actions">
                <div class="replay-header-stat">
                    <span>用途</span>
                    <strong>复盘与演示</strong>
                </div>
                <button class="btn-back" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i> 返回主页
                </button>
            </div>
        </div>

        <div class="replay-filter">
            <div class="replay-filter-group">
                <span class="filter-label">搜索任务</span>
                <input type="text" id="search-input" placeholder="搜索任务标题或工作区..." class="search-input">
            </div>
            <select id="time-filter" class="time-filter">
                <option value="all">全部时间</option>
                <option value="today">今天</option>
                <option value="week">最近一周</option>
                <option value="month">最近一月</option>
            </select>
        </div>

        <div class="replay-list" id="replay-list">
        </div>

        <div class="loading" id="loading" style="display: none;">
            <i class="fas fa-spinner fa-spin"></i> 加载中...
        </div>
    </div>

    <script src="js/replay-list.js"></script>
    <script>
        // 返回主页的函数
        function goBack() {
            const targetPage = window.location.pathname.includes('/cosight/') 
                ? 'workspace.html' 
                : '/cosight/workspace.html';
            window.location.href = targetPage;
        }
    </script>
</body>
</html>
